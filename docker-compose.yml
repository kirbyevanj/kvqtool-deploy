services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kvqtool}
      POSTGRES_USER: ${POSTGRES_USER:-kvq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kvqdev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kvq}"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporaldata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-db
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address temporal:7233 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-80}
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-kvqminio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-kvqminiodev}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set kvq http://minio:9000 ${S3_ACCESS_KEY:-kvqminio} ${S3_SECRET_KEY:-kvqminiodev}
        mc mb kvq/${S3_BUCKET:-kvq-bucket} --ignore-existing

  api-server:
    build:
      context: ..
      dockerfile: api-server/Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      KVQ_ENV: ${KVQ_ENV:-development}
      KVQ_DSN: postgres://${POSTGRES_USER:-kvq}:${POSTGRES_PASSWORD:-kvqdev}@postgres:5432/${POSTGRES_DB:-kvqtool}?sslmode=disable
      KVQ_TEMPORAL_HOST: temporal:7233
      KVQ_S3_ENDPOINT: http://minio:9000
      KVQ_S3_BUCKET: ${S3_BUCKET:-kvq-bucket}
      KVQ_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-kvqminio}
      KVQ_S3_SECRET_KEY: ${S3_SECRET_KEY:-kvqminiodev}
      KVQ_S3_REGION: ${S3_REGION:-us-east-1}
      KVQ_S3_PUBLIC_ENDPOINT: http://localhost:${MINIO_API_PORT:-9000}
      KVQ_LISTEN_ADDR: ":8080"
      KVQ_LOG_LEVEL: ${LOG_LEVEL:-debug}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker-node:
    build:
      context: ..
      dockerfile: worker-node/Dockerfile
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      KVQ_ENV: ${KVQ_ENV:-development}
      KVQ_TEMPORAL_HOST: temporal:7233
      KVQ_S3_ENDPOINT: http://minio:9000
      KVQ_S3_BUCKET: ${S3_BUCKET:-kvq-bucket}
      KVQ_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-kvqminio}
      KVQ_S3_SECRET_KEY: ${S3_SECRET_KEY:-kvqminiodev}
      KVQ_S3_REGION: ${S3_REGION:-us-east-1}
      KVQ_TEMP_DIR: /tmp/kvqtool
      KVQ_API_URL: http://api-server:8080
      KVQ_LOG_LEVEL: ${LOG_LEVEL:-debug}

  ml-inference-node:
    build:
      context: ../ml-inference-node
      dockerfile: Dockerfile
    ports:
      - "${GRPC_PORT:-50051}:50051"
    environment:
      TRANSNETV2_MODEL_PATH: /models/transnetv2.onnx
      GRPC_PORT: "50051"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - models:/models

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api-server

volumes:
  pgdata:
  temporaldata:
  miniodata:
  models:
